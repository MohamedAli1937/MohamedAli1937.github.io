<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <title>M.A Polar Geometry Logo</title>
  
  <defs>
    <style>
      /* 1. الألوان وسرعات الدوران الافتراضية */
      :root {
        --gold: #c9a227;
        --bg-primary: #0f121c;
        --speed-plane: 60s;
        --speed-outer: 30s;
        --speed-cross: 15s;
        --speed-inner: 12s;
        --speed-nodes: 30s;
      }
      
      /* 2. تسريع الدوران عند تمرير الماوس (Hover) */
      svg:hover {
        --speed-plane: 10s;
        --speed-outer: 5s;
        --speed-cross: 3s;
        --speed-inner: 3s;
        --speed-nodes: 6s;
      }

      /* --- حركات البناء (Entrance Animations) --- */
      .build-fade { opacity: 0; animation: fadeIn 1.5s ease-out forwards; }
      .build-draw-44 { stroke-dasharray: 277; stroke-dashoffset: 277; animation: drawLine 1.5s ease-out 0.2s forwards; }
      .build-draw-30 { stroke-dasharray: 189; stroke-dashoffset: 189; animation: drawLine 1.5s ease-out 0.5s forwards; }
      .build-draw-24 { stroke-dasharray: 151; stroke-dashoffset: 151; animation: drawLine 1.5s ease-out 0.8s forwards; }
      
      .build-petal {
        stroke-dasharray: 130; 
        stroke-dashoffset: 130; 
        fill-opacity: 0;
        stroke: var(--gold);
        animation: 
          drawLine 1.5s ease-in-out 1.2s forwards, 
          fillPetal 1s ease-in-out 2.8s forwards;
      }

      .build-core { opacity: 0; transform-origin: 50px 50px; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
      .build-core-inner { opacity: 0; transform-origin: 50px 50px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards; }
      .build-node { opacity: 0; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

      /* --- حركات الدوران المستمر (Continuous Spin) --- */
      .spin-plane { transform-origin: 50px 50px; animation: spin var(--speed-plane) linear infinite; }
      .spin-outer { transform-origin: 50px 50px; animation: spin var(--speed-outer) linear infinite; }
      .spin-cross { transform-origin: 50px 50px; animation: spin-reverse var(--speed-cross) linear infinite; }
      .spin-inner { transform-origin: 50px 50px; animation: spin-reverse var(--speed-inner) linear infinite; }
      .spin-nodes { transform-origin: 50px 50px; animation: spin var(--speed-nodes) linear infinite; }

      /* --- Keyframes --- */
      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes drawLine { to { stroke-dashoffset: 0; } }
      @keyframes popIn { 
        0% { opacity: 0; transform: scale(0); } 
        100% { opacity: 1; transform: scale(1); } 
      }
      @keyframes fillPetal { 
        to { fill-opacity: 1; stroke: var(--bg-primary); } 
      }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    </style>
  </defs>

  <g class="build-fade" style="animation-delay: 0.4s">
    <g class="spin-plane" stroke="var(--gold)" stroke-width="0.3" stroke-dasharray="1 2">
      <line x1="50" y1="5" x2="50" y2="95"/>
      <line x1="5" y1="50" x2="95" y2="50"/>
    </g>
  </g>

  <g class="build-fade" style="animation-delay: 0.6s">
    <circle class="spin-outer" cx="50" cy="50" r="42" fill="none" stroke="var(--gold)" stroke-width="0.5" stroke-dasharray="2 3"/>
  </g>

  <circle class="build-draw-44" cx="50" cy="50" r="44" fill="none" stroke="var(--gold)" stroke-width="0.1"/>

  <g class="build-fade" style="animation-delay: 1s">
    <g class="spin-cross" stroke="var(--gold)" stroke-width="0.8">
      <line x1="50" y1="6" x2="50" y2="10"/>
      <line x1="50" y1="90" x2="50" y2="94"/>
      <line x1="6" y1="50" x2="10" y2="50"/>
      <line x1="90" y1="50" x2="94" y2="50"/>
    </g>
  </g>

  <circle class="build-draw-30" cx="50" cy="50" r="30" fill="none" stroke="var(--gold)" stroke-width="1.5" opacity="0.9"/>

  <g class="build-fade" style="animation-delay: 1.2s">
    <circle class="spin-inner" cx="50" cy="50" r="27" fill="none" stroke="var(--gold)" stroke-width="1" opacity="0.75" stroke-dasharray="6 2"/>
  </g>

  <circle class="build-draw-24" cx="50" cy="50" r="24" fill="none" stroke="var(--gold)" stroke-width="0.8" opacity="0.5"/>

  <g class="spin-nodes" fill="var(--gold)">
    <circle class="build-node" style="animation-delay: 2.2s; transform-origin: 23px 38px;" cx="23" cy="38" r="1.5"/>
    <circle class="build-node" style="animation-delay: 2.4s; transform-origin: 77px 62px;" cx="77" cy="62" r="1.5"/>
    <circle class="build-node" style="animation-delay: 2.6s; transform-origin: 63px 23px;" cx="63" cy="23" r="1" opacity="0.8"/>
    <circle class="build-node" style="animation-delay: 2.8s; transform-origin: 37px 77px;" cx="37" cy="77" r="1" opacity="0.8"/>
  </g>

  <g fill="var(--gold)" stroke-width="1.5" stroke-linejoin="round">
    <path class="build-petal" d="M50,50 Q75,25 90,50 Q75,75 50,50" transform="rotate(0, 50, 50)"/>
    <path class="build-petal" d="M50,50 Q75,25 90,50 Q75,75 50,50" transform="rotate(72, 50, 50)"/>
    <path class="build-petal" d="M50,50 Q75,25 90,50 Q75,75 50,50" transform="rotate(144, 50, 50)"/>
    <path class="build-petal" d="M50,50 Q75,25 90,50 Q75,75 50,50" transform="rotate(216, 50, 50)"/>
    <path class="build-petal" d="M50,50 Q75,25 90,50 Q75,75 50,50" transform="rotate(288, 50, 50)"/>
  </g>

  <circle class="build-core" cx="50" cy="50" r="3" fill="var(--gold)"/>
  <circle class="build-core-inner" cx="50" cy="50" r="1.5" fill="var(--bg-primary)"/>
</svg>
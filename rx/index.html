## Partie 2 — Client HTTP

### Lancer le client

\`\`\`bash
./client_http 10.250.101.1 80
\`\`\`

Entrer ensuite :
\`\`\`
HEAD / HTTP/1.1
Host: 10.250.101.1
Accept: */*

\`\`\`
*(ligne vide finale obligatoire)*

Remplacer HEAD par GET pour récupérer le contenu de la page.

### Réponses aux questions

**Établissement de la connexion au niveau TCP :**  
TCP utilise un three-way handshake :
1. Client → Serveur : SYN
2. Serveur → Client : SYN-ACK
3. Client → Serveur : ACK

**Établissement au niveau HTTP :**  
HTTP/1.1 est sans état. La connexion est établie par TCP ; HTTP envoie ensuite sa requête texte.

**Qui ferme la connexion et quand ?**  
Avec HEAD : le serveur ferme après la réponse (Connection: close).  
Avec GET : le serveur envoie le body puis ferme (ou le client peut fermer).

**Ports utilisés :**  
- Serveur : port 80 (fixe, bien connu)
- Client : port éphémère aléatoire (> 1024, ex: 54321)

**Chronogramme simplifié :**
\`\`\`
Client                    Serveur
  |-------- SYN ------------>|
  |<------- SYN-ACK ---------|
  |-------- ACK ------------>|
  |--- GET / HTTP/1.1 ------->|
  |<-- HTTP/1.1 200 OK ------|
  |<-- [données HTML] --------|
  |<------- FIN -------------|
  |-------- FIN-ACK -------->|
\`\`\`

## Partie 3 — TCP : transfert de messages

### Lancer

Machine serveur (Station 2) :
\`\`\`bash
./serveur_tcp 5000
\`\`\`

Machine client (Station 1) :
\`\`\`bash
./client_tcp <IP_serveur> 5000
\`\`\`

### Réponses aux questions

**Comptage sans sleep vs avec sleep(1) :**  
Sans sleep : les messages peuvent être fusionnés par TCP (algorithme de Nagle).
Un seul recv() peut ramener plusieurs messages d'un coup → le comptage par '\\n'
est nécessaire. Aucune perte : TCP garantit la livraison.

Avec sleep(1) : chaque message est envoyé séparément, les recv() correspondent
mieux aux send(). Toujours aucune perte.

**Segments TCP ≠ écritures send() ?**  
OUI. TCP est un flux d'octets, pas de messages. Il peut regrouper (Nagle) ou
découper les données. Un send() peut produire plusieurs segments, ou plusieurs
send() peuvent être regroupés en un seul segment.

**Débrancher le câble :**  
- Câble débranché durablement : recv()/send() bloque puis retourne une erreur
  ECONNRESET ou ETIMEDOUT après le timeout TCP (peut prendre plusieurs minutes).
- Câble rebranché rapidement : la connexion TCP survit si le timeout n'est pas
  atteint ; les données sont retransmises automatiquement.

**Plusieurs clients simultanés (serveur itératif) :**  
Non, le serveur itératif (sans fork) ne peut servir qu'un client à la fois.
Les autres clients sont dans la file d'attente (backlog).
Si la file est pleine (BACKLOG=5), les nouveaux clients reçoivent ECONNREFUSED
ou leur SYN est ignoré.

## Partie 4 — UDP : transfert de messages

### Lancer

Machine serveur :
\`\`\`bash
./serveur_udp 5001
\`\`\`

Machine client :
\`\`\`bash
./client_udp <IP_serveur> 5001
\`\`\`

### Réponses aux questions

**Différences TCP vs UDP :**

| Critère          | TCP                       | UDP                        |
|------------------|---------------------------|----------------------------|
| Connexion        | Oui (three-way handshake) | Non                        |
| Fiabilité        | Garantie                  | Aucune garantie            |
| Ordre            | Garanti                   | Non garanti                |
| Pertes           | Impossibles (retrans.)    | Possibles                  |
| Surcharge        | Headers + retransmissions | Léger                      |
| Adapté à         | HTTP, SSH, FTP...         | DNS, streaming, jeux...    |

**Pertes en UDP :**  
Observables si le réseau est saturé ou si le sleep(1) côté serveur désynchronise
l'envoi/réception. Le client implémente un timeout (SO_RCVTIMEO) pour ne pas
bloquer indéfiniment.

**Serveur UDP multi-clients :**  
UDP étant sans connexion, le serveur peut lire des datagrammes de plusieurs
clients dans la même boucle recvfrom(). Pour les traiter en parallèle, on peut
aussi utiliser fork() après recvfrom().

## Partie 5 — Serveur concurrent

### Lancer

\`\`\`bash
./serveur_concurrent
\`\`\`

Le serveur écoute simultanément sur 3 ports :
- **5000** : heure courante (60 messages, sleep 1s par message)
- **5001** : nombre de processus actifs (ps aux | wc -l)
- **5002** : service echo

### Test de concurrence

Ouvrir plusieurs terminaux et lancer simultanément :
\`\`\`bash
# Terminal 1
./client_tcp 127.0.0.1 5000

# Terminal 2 (en même temps que Terminal 1)
./client_tcp 127.0.0.1 5000

# Terminal 3 (service différent)
./client_tcp 127.0.0.1 5001
\`\`\`

Observer que les deux clients sur le port 5000 reçoivent leurs messages
en même temps (timestamps identiques), prouvant le traitement parallèle.

### Réponse à la question sur le temps

Avec N clients simultanés sur le service heure (sleep 1s × 60 messages) :
- Serveur itératif : temps total = N × 60 secondes
- Serveur concurrent (fork) : temps total ≈ 60 secondes (quel que soit N)

Le fork() crée un processus fils par client ; ils s'exécutent en parallèle.
Cependant, si N est très grand : la création de nombreux processus consomme
beaucoup de mémoire et de ressources CPU. Le scheduler doit gérer tous ces
processus, ce qui peut dégrader les performances.

### Fonctionnement interne (select + fork)

\`\`\`
main()
  └── select() surveille les 3 sockets d'écoute
        ├── Connexion sur port 5000 → accept() → fork()
        │     ├── Fils : service_heure() → close → exit(0)
        │     └── Père : ferme conn_fd, retourne à select()
        ├── Connexion sur port 5001 → accept() → fork()
        │     ├── Fils : service_processus() → close → exit(0)
        │     └── Père : ferme conn_fd, retourne à select()
        └── Connexion sur port 5002 → accept() → fork()
              ├── Fils : service_echo() → close → exit(0)
              └── Père : ferme conn_fd, retourne à select()
\`\`\`

### Éviter les zombies

Le gestionnaire SIGCHLD appelle waitpid(WNOHANG) pour récupérer les fils
terminés sans bloquer le père.`;

          return;

        const step = activeLogs[currentStep];
        const div = document.createElement("div");
        if (step.type === "prompt") {
          div.innerHTML = `<span class="prompt">mohamed_ali@MedAli:~$</span> <span class="log-s">${step.m}</span>`;
        } else {
          div.className = step.type;
          div.textContent = step.m;
        }
        appendLine(step.t, div);
        currentStep++;
        if (step.auto && currentStep < activeLogs.length) {
          await new Promise((r) => setTimeout(r, 600));
          nextStep();
        }
      }

      function appendLine(target, element) {
        const container = document.getElementById("term-" + target);
        if (container) {
          container.appendChild(element);
          container.scrollTop = container.scrollHeight;
        }
